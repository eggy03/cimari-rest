name: Build and Release Native Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:

  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: graalvm
          java-version: 25
          cache: maven

      - name: Build Native Executable
        run: mvn clean package -Dnative

      - name: Rename executable
        shell: pwsh
        run: |
          Rename-Item -Path "target/cimari-rest-runner.exe" -NewName "cimari-${{ github.ref_name }}-windows-x64.exe"  

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: cimari-${{ github.ref_name }}-windows-x64
          path: target/cimari-${{ github.ref_name }}-windows-x64.exe

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/**/*.exe